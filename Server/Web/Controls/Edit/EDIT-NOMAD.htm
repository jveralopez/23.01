<!DOCTYPE html >
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1" />

<link href="editor.css" type="text/css" rel="stylesheet" />
<script src="editor.js" type="text/javascript" language="javascript"  ></script>
<script src="nomad.js" type="text/javascript" language="javascript"  ></script>

<script>
var g_objEditor, g_objSyntax;

function OnLoadPage()
{
	var sizeX=parseInt(GetUrlVariable("WIDTH"),10); sizeX=sizeX?sizeX:80;
	var sizeY=parseInt(GetUrlVariable("HEIGHT"),10); sizeY=sizeY?sizeY:30;
	
	var g_objSyntax=new clsNomadScript();

	g_objEditor=new clsEditor(sizeX,sizeY,g_objSyntax);
	g_objEditor.SetText("");
	
	if (GetUrlVariable("ONLOAD")!="") eval(GetUrlVariable("ONLOAD"));
}
</script>
</head>

<body onload="OnLoadPage()" >
&nbsp;
</body>
</html>
