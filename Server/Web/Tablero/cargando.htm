<html>
	<HEAD>
			<SCRIPT>
			
					function submitTrap()
					{
						var d=document.getElementById("msgdiv");
						var t=document.getElementById("msgtxt");
						
						d.style.position = "absolute";
						d.style.top = (document.body.clientWidth-document.body.offsetWidth)/2;
						d.style.left = (document.body.clientWidth-document.body.offsetWidth)/2;
						d.style.height = document.body.offsetHeight;
						d.style.width = document.body.offsetWidth;
						d.style.display="inline";
						t.style.display="inline";		
				
					}
			
			</SCRIPT>
	</HEAD>
<body onload="submitTrap(); window.parent.document.forms[0].submit()"  >



			<div id="msgdiv" style="display: none; background-color: #F0F0F0; /* for IE */ filter:alpha(opacity=60); /* CSS3 standard */ opacity:0.6; /* for Mozilla */ -moz-opacity:0.6;">
			</div>
			<div id="msgtxt" style="text-align: center; display: none; position: absolute; top: 15px; right: 15px; height: 25px; width: 120px;">
				<img src="./images/throbber10.gif"/>&nbsp;<b>Procesando...</b>
			</div>
	</body>
</html>
