<HTML>
	<HEAD>
		<TITLE>Carga tu curriculum</TITLE>
			
		<script src="./Scripts/nmdProxy.js" type="text/javascript"></script>
		<script src="./Scripts/engComm.js"  type="text/javascript"></script>
		<script src="./Scripts/nmdXML.js"   type="text/javascript"></script>
		
		<SCRIPT src="./Scripts/controls.js" type="text/javascript"></SCRIPT>
		
		<LINK HREF="./Styles/General.css" REL="stylesheet" TYPE="text/css">
		
		<SCRIPT type="text/javascript" language="javascript">
			var gxmlUData = null;
			var arrParams = new Array();

			function PageOnLoad() {
				var Mess;
				var alertMess;
				
				//Recupera los parametros desde la URL
				Mess = GetUrlVariable("mess");
				alertMess = GetUrlVariable("alertmess");
				
				SetMessage(Mess);
				
				if (alertMess == "1")
					alert(Mess);
				
				ShowWait(false);
			}

			//Muestra u oculta el cartelito de procesando...
			function ShowWait(pShow) {
				var objHTML = document.getElementById("DivWait");
				
				if (pShow == false) {
					objHTML.style.display = "none";
				
				} else {
					objHTML.style.display = "inline";
					
					objHTML = document.getElementById("TDWait");
					objHTML.innerHTML = pShow; 
				}
				
			}
			
			function SetMessage(pMess) {
				var objSpMess = document.getElementById("spMess");
				objSpMess.innerHTML = pMess;
			}
			
		</SCRIPT>

	</HEAD>
	<BODY class="Main" scroll="no" onload="PageOnLoad();">
		<table style="TABLE-LAYOUT: fixed" cellpadding="0" cellspacing="0" height="100%" width="100%">
			<tr class="TopMenu">
				<td id="top" name="top" >&nbsp;</td>
			</tr>
			<tr>
				<td class="toptitle alignRight" width="100%" nowrap="1">
					<table class="TopMenuText">
						<tr>
							<td>&nbsp;</td>
						</tr>
					</table>
				</td>
			</tr>
			<tr height="100%">
				<td height="100%" valign="middle" class="alignCenter">
					<span id="spMess" name="spMess" class="title_2">&nbsp;</span>
				</td>
			</tr>
		</table>

		<!--Div de LOGO -->
		<div id="DivLogo" name="DivLogo" class="logo">
			<img src="Images/logo.gif">
		</div>

		<!--Div de WAIT -->
		<div id="DivWait" name="DivWait">
			<table cellpadding="0" cellspacing="0" height="100%" width="100%">
				<tr height="100%" width="100%">
					<td id="TDWait" name="TDWait" valign="middle">Cargando...</td>
				</tr>
			</table>
		</div>

	</BODY>
</HTML>
