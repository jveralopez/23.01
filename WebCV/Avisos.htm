<HTML>
	<HEAD>
		<LINK HREF="./Styles/General.css" REL="stylesheet" TYPE="text/css">

		<script src="./Scripts/nmdXML.js"   type="text/javascript"></script>

		<SCRIPT src="./Scripts/controls.js" type="text/javascript"></SCRIPT>
		
		<SCRIPT type="text/javascript" language="javascript">
			var gOIAviso;
			var gfromOIAviso;
						
			function PageLoad() {
								
				gfromOIAviso = GetUrlVariable("oi_aviso");
				
				parent.ShowWait(false);
				gOIAviso = null;
				
				if (parent.gxmlUData)  {
					document.getElementById("btnPostulaciones").style.display = "";
				}
								
				if (gfromOIAviso != "") 
					ShowDetail(gfromOIAviso);
				else {
					if (parent.GetMainParam("show_mis_postus") != "") {
						parent.SetMainParam("show_mis_postus", "");
						btnPostulaciones_Click();
					}
				}
				
				document.getElementById("p_clave").focus();
				
			}

			function btnCancelar_Click() {
				history.back();
			}

			function btnBuscar_Click() {
				CallTimeOut("Cargando los avisos...", "ValidateRegis();");
			}

			function btnUltimas_Click() {
				CallTimeOut("Cargando los avisos...", "UltimosAvisos();");
			}

			function btnPostulaciones_Click() {
				CallTimeOut("Cargando los avisos...", "MisPostulaciones();");
			}

			function UltimosAvisos() {
				var objHTML, objIFR;
				var strTemp;
				var strPClave;
				
				objHTML = document.getElementById("p_clave");
				objIFR = document.getElementById("ifrAvisos");
				
				if (objHTML && objIFR) {
					objHTML.value_ant = "";
					objHTML.value = "";
					
					ShowAvisos(GetURLAvisos(null, 20, false, true, false));
									
				} else { parent.ShowWait(false); return; }
				
				return;
			}
			
			function ValidateRegis() {
				var objHTML, objIFR;
				var strTemp;
				var strPClave;
				
				objHTML = document.getElementById("p_clave");
				objIFR = document.getElementById("ifrAvisos");
				
				if (objHTML && objIFR) {
					strPClave = objHTML.value;
					
					if (strPClave == "") {parent.ShowWait(false); return;}
					
					if (strPClave == objHTML.value_ant)
						ShowAvisos(null);
					else {
						objHTML.value_ant = strPClave;
						ShowAvisos(GetURLAvisos(strPClave, null, false, false, true));
					}
									
				} else { parent.ShowWait(false); return; }
				
				return;
			}

			function MisPostulaciones() {
				var objHTML, objIFR;
				var strTemp;
				var strPClave;
				
				objHTML = document.getElementById("p_clave");
				objIFR = document.getElementById("ifrAvisos");
				
				if (objHTML && objIFR) {
					objHTML.value_ant = "";
					objHTML.value = "";
					
					ShowAvisos(GetURLAvisos(null, 20, true, false, true));
									
				} else { parent.ShowWait(false); return; }
				
				return;
			}
			
			function PageShowWait(pMode) {
				parent.ShowWait(pMode);
				return;
			}
			
			function GetURLAvisos(pPClave, pSize, pPostu, pCache, pCV) {
				var result = "";
				var params;
				var file = "NucleusRH.Base.SeleccionDepostulantes.Avisos.rpt";
				
				params = "file=" + file + "&waitoff=1";

				if (pPClave) {
					params = params + "&p_clave=" + pPClave;
				}
				
				if (parent.gxmlUData && pCV) {
					params = params + "&oi_cv=" + parent.gxmlUData.GetAttr("oi_cv");
				} else {
					params = params + "&cache=4"; //Si no esta logeado cachea el resultado
				}
				
				if (pSize) {
					params = params + "&maxsize=" + pSize;
				}
				
				if (pPostu) {
					params = params + "&postus=1";
				}
				
				//Le agrega un parametro de control
				//params = params + "&d=" + formatDate(new Date(), "ddSS");

				/*
				if (pCache) {
					params = params + "&cache=4";
				}
				*/
				
				result = "reportviewer.aspx?" + params;
				
				return result;
			}

			function GetURLDetalle(pOIAviso) {
				var result = "";
				var params;
				var file = "NucleusRH.Base.SeleccionDepostulantes.DetalleAviso.rpt";
				
				params = "file=" + file + "&oi_aviso=" + pOIAviso + "&waitoff=1";
				
				if (parent.gxmlUData) {
					params = params + "&oi_cv=" + parent.gxmlUData.GetAttr("oi_cv");
				}

				//Le agrega un parametro de control
				//params = params + "&d=" + formatDate(new Date(), "ddMMSS");
				
				//result = "reportviewer.aspx?" + params + "&cache=4";
				result = "reportviewer.aspx?" + params;
				
				return result;
			}
						
			function ShowDetail(pOIAviso) {
				gOIAviso = pOIAviso;
				CallTimeOut("Cargando el aviso...", "ShowDetail2();");
			}
			
			function ShowDetail2() {
				var objIFRA;
				var objIFRD;
				var objTRA;
				var objTRD;				
				var objTitu;
				
				objIFRA = document.getElementById("ifrAvisos");
				objIFRD = document.getElementById("ifrDetalle");
				objTRA = document.getElementById("tdAvisos");
				objTRD = document.getElementById("tdDetalle");				
				objTitu = document.getElementById("spTitu");
				
				if (objIFRA && objIFRD) {
					objTitu.innerHTML = "Detalle del aviso";
					objIFRD.src = GetURLDetalle(gOIAviso);
					
					//objIFRA.style.display = "none";
					//objIFRD.style.display = "";
					objTRA.style.display = "none";
					objTRD.style.display = "";					
					
				}
			}

			function ShowAvisos(pURL) {
				var objIFRA;
				var objIFRD;
				var objTRA;
				var objTRD;
				var objTitu;
				
				objIFRA = document.getElementById("ifrAvisos");
				objIFRD = document.getElementById("ifrDetalle");
				objTRA = document.getElementById("tdAvisos");
				objTRD = document.getElementById("tdDetalle");
				objTitu = document.getElementById("spTitu");
				
				if (objIFRA && objIFRD) {
					gOIAviso = null;
					objTitu.innerHTML = "Resultado de la búsqueda";
					
					//objIFRD.style.display = "none";
					//objIFRA.style.display = "";
					objTRD.style.display = "none";
					objTRA.style.display = "";					
					
					if (pURL)
						objIFRA.src = pURL;
					else
						parent.ShowWait(false);
						
					objIFRD.src = "about:blank";
				}
			}
			
			function btnPostularse_Click(pOIAviso) {
				CallTimeOut("Procesando los datos...", "Postularse();");
			}
			
			function Postularse() {
				
				if (parent.gxmlUData)  {
					var xmlResult;
					var xmlData;

					xmlData = new NomadXML("DATA");
					xmlData.SetAttr("oi_aviso", gOIAviso)
					xmlData.SetAttr("oi_cv", parent.gxmlUData.GetAttr("oi_cv"));
					
					xmlResult = parent.ExecuteNomadMethod("NucleusRH.Base.SeleccionDePostulantes.CVs.CV", "Postular", xmlData);
					
					if (xmlResult == null) {
						alert("Se produjo un error en el sistema. Por favor reintente nuevamente en unos minutos.")
					} else {
						if (xmlResult.GetAttr("out") == "OK") {
							alert("La postulación se realizó correctamente.");
							frames["ifrAvisos"].showPostulado(gOIAviso);
							ShowAvisos(null);
						} else {
							alert("Error realizando la postulación: " + xmlResult.GetAttr("out"));
						}
					}
				} else {
					alert("Para postularse debe registrarse o iniciar sesión.")
				}
				
				parent.ShowWait(false);
			}
			
			function p_clave_KPress(pkeyCode) {
				if (pkeyCode == 13)
					btnBuscar_Click();
			}
			
		</SCRIPT>

	</HEAD>
	<BODY onload="PageLoad();" scroll="no" class="Main">
		<table style="TABLE-LAYOUT: fixed" cellpadding="0" cellspacing="0" height="100%" width="100%">
			<col width="100%" />
			<tr>
				<td style="vertical-align:top; padding-top:30px;" class="alignCenter">
				
					<table style="TABLE-LAYOUT: fixed" width="90%" height="100%" align="center">
						<col width="50%" />
						<col width="50%" />
						
						<!-- Titulo -------------------------------------------------->
						<tr>
							<td class="titulo_1" colspan="2">Ofertas laborales - Avisos</td>
						</tr>

						<!-- Campos de busqueda -------------------------------------->
						<tr>
							<td class="label_r">
								Palabra clave:
							</td>
							<td>&nbsp;</td>
						</tr>
						
						<tr>
							<td>
								<INPUT name="p_clave" id="p_clave" class="Box" value_ant="" onkeypress="p_clave_KPress(event.keyCode);" style="width:100%;" type="text" VALUE=""/>
							</td>
							<td>
								&nbsp;
								<a name="btnBuscar" id="btnBuscar"
			   						href="javascript:CallNothing();"
			   						class="Buttons BImg BC_n"
			   						style="background-image: url(./Images/Buttons/search_n.gif);"
									onclick="btnBuscar_Click();"
									onmouseover="ButtonChangeStyle(this,'OVER');"
									onmouseout="ButtonChangeStyle(this,'NORMAL');"
									onfocus="ButtonChangeStyle(this,'OVER');"
									onblur="ButtonChangeStyle(this,'NORMAL');"
								>Buscar</a>
								&nbsp;&nbsp;
								<a name="btnUltimas" id="btnUltimas"
			   						href="javascript:CallNothing();"
			   						class="Buttons BImg BC_n"
			   						style="background-image: url(./Images/Buttons/new_n.gif);"
									onclick="btnUltimas_Click();"
									onmouseover="ButtonChangeStyle(this,'OVER');"
									onmouseout="ButtonChangeStyle(this,'NORMAL');"
									onfocus="ButtonChangeStyle(this,'OVER');"
									onblur="ButtonChangeStyle(this,'NORMAL');"
								>&Uacute;ltimas ofertas</a>
								&nbsp;&nbsp;
								<a name="btnPostulaciones" id="btnPostulaciones"
			   						href="javascript:CallNothing();"
			   						class="Buttons BImg BC_n"
			   						style="background-image: url(./Images/Buttons/postulaciones_n.gif); display:none;"
									onclick="btnPostulaciones_Click();"
									onmouseover="ButtonChangeStyle(this,'OVER');"
									onmouseout="ButtonChangeStyle(this,'NORMAL');"
									onfocus="ButtonChangeStyle(this,'OVER');"
									onblur="ButtonChangeStyle(this,'NORMAL');"
								>Mis postulaciones</a>								
							</td>
						</tr>
						
						<!-- Campos de busqueda -------------------------------------->
						<tr><td colspan="2">&nbsp;</td></tr>
						
						<tr>
							<td colspan="2" class="titulo_2">
								<span class="titulo_2_span" id="spTitu" name="spTitu">Resultado de la b&uacute;squeda</span>
							</td>
						</tr>
						
						<tr><td colspan="2">&nbsp;</td></tr>

						<tr id="tdAvisos" name="tdAvisos">
							<td style="width:100%; height:100%;" colspan="2">
								<iframe id="ifrAvisos" name="ifrAvisos" style="width:100%; height:100%;" src="about:blank" frameborder="0">
								</iframe>
							</td>
						</tr>
						<tr id="tdDetalle" name="tdDetalle" style="display:none;">
							<td style="width:100%; height:100%;" colspan="2">
								<iframe id="ifrDetalle" name="ifrDetalle" style="width:100%; height:100%;" src="about:blank" frameborder="0">
								</iframe>
							</td>
						</tr>						
					</table>				
				</td>
			</tr>
		</table>
	</BODY>
</HTML>
