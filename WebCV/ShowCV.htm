<HTML>
	<HEAD>
		<LINK HREF="./Styles/General.css" REL="stylesheet" TYPE="text/css">
		
		<script src="./Scripts/nmdProxy.js" type="text/javascript"></script>
		<script src="./Scripts/engComm.js"  type="text/javascript"></script>
		<script src="./Scripts/nmdXML.js"   type="text/javascript"></script>

		<SCRIPT src="./Scripts/controls.js" type="text/javascript"></SCRIPT>
		
		<SCRIPT type="text/javascript" language="javascript">
			function PageLoad() {
				var objUsuario;
				
				/*parent.LogMode("LO");*/
				SetCV();

				objUsuario = document.getElementById("TDUser");
				objUsuario.innerHTML = "Bienvenid" + (parent.gxmlUData.GetAttr("c_sexo") == "F" ? "a" : "o") + " " + parent.gxmlUData.GetAttr("d_ape_y_nom");
				
				parent.ShowWait(false);
			}

			function btnModificar_Click() {
				CallTimeOut("Requiriendo los datos del usuario...", "GetUserData();");
			}
			
			function btnImprimir_Click() {
				window.open(GetURLCV() + "&print=1", "", "channelmode=no,directories=no,fullscreen=no,location=no,menubar=no,resizable=yes,scrollbars=yes,status=yes,titlebar=no,toolbar=no");
			}
			
			function GetUserData() {

				if (parent.IsFullData()) {
					ShowEditableCV();
				
				} else {

					var xmlData;
					var xmlResult;
				
					xmlData = parent.GetLogData();
	
					if (xmlData) {
						xmlResult = parent.ExecuteNomadMethod("NucleusRH.Base.SeleccionDePostulantes.CVs.CV", "GetCV", xmlData);
						
						if (xmlResult == null) {
							alert("Se produjo un error en el sistema. Por favor reintente nuevamente en unos minutos.")
						} else {
							if (xmlResult.GetAttr("out") == "OK") {
								parent.gxmlUData = xmlResult;
								ShowEditableCV();
							} else {
								alert("Error recuperando los datos: " + xmlResult.GetAttr("out"));
							}
						}
					}				
				}

				
				parent.ShowWait(false);
				return;

			}
			
			function ShowEditableCV() {
				parent.MakeUDataBKP();
				location.href = "CargaCV_DatosPer.htm";
			}
			
			function SetCV() {
				if (parent.gxmlUData) {
					var objIFR;
					objIFR = document.getElementById("ifrCV");
					objIFR.src = GetURLCV();
				}
			}
			
			function GetURLCV() {
				var result = "";
				
				if (parent.gxmlUData) {
					var file = "NucleusRH.Base.SeleccionDepostulantes.CVWeb.rpt";
					var params = "file=" + file + "&oi_cv=" + parent.gxmlUData.GetAttr("oi_cv") + "&c_seguridad=" + parent.gxmlUData.GetAttr("c_seguridad");
					
					//Le agrega un parametro de control
					params = params + "&d=" + formatDate(new Date(), "ddSS");
					
					result = "reportviewer.aspx?" + params;
				}
				
				return result;
			}
			
		</SCRIPT>

	</HEAD>
	<BODY onload="PageLoad();" scroll="no" class="Main">
		<table style="TABLE-LAYOUT: fixed" cellpadding="0" cellspacing="0" height="100%" width="100%">
			<col width="100%"/>
			<tr>
				<td style="vertical-align:top; padding-top:10px;" class="alignCenter">
				
					<table style="TABLE-LAYOUT: fixed" width="90%" height="100%">
						<col />
						<col width="240" />

						<tr>
							<td colspan="2" class="title_2" id="TDUser" name="TDUser">Bienvenido</td>
						</tr>
						
						<tr>
							<td colspan="2" class="title_3" style="FONT-WEIGHT: normal; FONT-SIZE: 14px;">Contanos de vos. Carg&aacute; tu CV para que podamos conocerte.</td>
						</tr>

						<!--Botonera --->
						<tr>
							<td class="text_1" style="FONT-SIZE: 12px; text-align:right; PADDING-RIGHT: 20px; BACKGROUND-POSITION:center right; BACKGROUND-REPEAT:no-repeat; BACKGROUND-IMAGE:url(images/Links/link2_o.gif)">Mantenelo actualizado o imprimite un copia desde aqui</td>

							<td class="text_1" style="text-align:right; vertical-align:bottom;">
								<a name="btnModificar" id="btnModificar"
			   						href="javascript:CallNothing();"
			   						class="Buttons BImg BC_n"
			   						style="background-image: url(./Images/Buttons/edit_n.gif);"
									onclick="btnModificar_Click();"
									onkeypress="btnModificar_Click();"
									onmouseover="ButtonChangeStyle(this,'OVER');"
									onmouseout="ButtonChangeStyle(this,'NORMAL');"
									onfocus="ButtonChangeStyle(this,'OVER');"
									onblur="ButtonChangeStyle(this,'NORMAL');"
								>Modificar CV</a>

								<a name="btnImprimir" id="btnImprimir"
			   						href="javascript:CallNothing();"
			   						class="Buttons BImg BC_n"
			   						style="background-image: url(./Images/Buttons/print_n.gif);"
									onclick="btnImprimir_Click();"
									onkeypress="btnImprimir_Click();"
									onmouseover="ButtonChangeStyle(this,'OVER');"
									onmouseout="ButtonChangeStyle(this,'NORMAL');"
									onfocus="ButtonChangeStyle(this,'OVER');"
									onblur="ButtonChangeStyle(this,'NORMAL');"
								>Imprimir CV</a>
							</td>
						</tr>
						
						<tr>
							<td height="100%" colspan="2" >
								<iframe id="ifrCV" name="ifrCV" style="width:100%; height:100%;" src="about:blank" frameborder="0">
								</iframe>
							</td>
						</tr>

					</table>				
				</td>
			</tr>
		</table>
	</BODY>
</HTML>
