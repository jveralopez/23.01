<HTML>
	<HEAD>
		<LINK HREF="./Styles/General.css" REL="stylesheet" TYPE="text/css">
		
		<SCRIPT src="./Scripts/controls.js" type="text/javascript"></SCRIPT>
		<script src="./Scripts/nmdXML.js"   type="text/javascript"></script>
		
		<script type="text/javascript" language="javascript">

			function PageLoad() {
				var objTemp;
				var controlName;
				
				objTemp = document.getElementById("hidClass"); objTemp.value = GetUrlVariable("class");
				objTemp = document.getElementById("hidMethodClass"); objTemp.value = GetUrlVariable("methodclass");
				objTemp = document.getElementById("hidMethodName"); objTemp.value = GetUrlVariable("methodname");
				
				controlName = GetUrlVariable("controlname");
				
				frames["helperIframe"].src = "../../../BrowsePage.aspx"
				
			}
			
			//Boton de ACEPTAR del HelperPage
			function btnAccept_Click() {
				var objFile;
				var objTemp;
				
				objFile = document.getElementById("flUpLoad");
				if (objFile.value == "") {
					//Cierra el iframe
					parent.closeUploadFrame();
					return;
					}
				
				objTemp = document.getElementById("trFile"); objTemp.style.display = "none";
				objTemp = document.getElementById("trButtons"); objTemp.style.display = "none";
				objTemp = document.getElementById("trText"); objTemp.style.display = "block";

				document.getElementById("Form1").submit();
			}

			//Boton de CANCELAR del HelperPage
			function btnCancel_Click() {
				//Cierra el iframe
				parent.closeUploadFrame();
			}

			function FinishOK(pstrResult) {
				//Define el documento en gObject del parent
				objResult = new NomadXML(pstrResult);
				var Result = objResult.GetAttr("id");
				parent.gObject.SetOIDoc(Result);
				
				//Cierra el iframe 
				parent.closeUploadFrame();
			}
			
			function SetParams(pClass, pMethodClass, pMethodName, pExtensions) {
				var objTemp;
				
				objTemp = document.getElementById("hidClass");
				objTemp.value = pClass;

				objTemp = document.getElementById("hidMethodClass");
				objTemp.value = pMethodClass;
				
				objTemp = document.getElementById("hidMethodName");
				objTemp.value = pMethodName;
				
				objTemp = document.getElementById("hidExtensions");
				objTemp.value = pExtensions;												
			}

			//Retorna el valor de una varible pasada por querystring
			function GetUrlVariable (pName) {
				pName = "&" + pName + "=";
				
				var strResult = "";
				var strStartVariable;
				var strQueryString = "&" + location.href.substr(location.href.indexOf("?") + 1, 512);
				
				if (strQueryString.indexOf(pName) >= 0) {
			    	strStartVariable = strQueryString.substr(strQueryString.indexOf(pName)+pName.length, 512);
			    	var hasta = strStartVariable.substr(0, 512).indexOf("&");
			    	strResult=(hasta<0?strStartVariable:strStartVariable.substr(0, hasta));
				}
				
				strResult = strResult.replace(new RegExp("%20", "ig"), " ");
				strResult = strResult.replace(new RegExp("%3F", "ig"), "?");
				strResult = strResult.replace(new RegExp("%26", "ig"), "&");
				strResult = strResult.replace(new RegExp("%25", "ig"), "%");
				return strResult;
			}
			
			function CloseChangeStyle(img, event) {
			
				if(event=='OVER')
					img.src="./Images/Buttons/close_o.png";
				else if(event=='NORMAL')
					img.src="./Images/Buttons/close_n.png";
					
			}
		</script>
	</HEAD>

	<body onload="PageLoad();" class="BrowserMain" scroll="no">
		<a 	name="btnClose" id="btnClose"
			href="javascript:CallNothing();"
			onclick="btnCancel_Click();"
			onkeypress="btnCancel_Click();"
			/>
			<img src="./Images/Buttons/close_n.png" alt="Cerrar" height="24" width="24" onmouseover="CloseChangeStyle(this,'OVER');" onmouseout="CloseChangeStyle(this,'NORMAL');" onfocus="CloseChangeStyle(this,'OVER');" onblur="CloseChangeStyle(this,'NORMAL');" style="float:right; border:none; position:absolute; top:0px; right:0px;">
		</a>

		<table style="TABLE-LAYOUT: fixed;" class="MainTable" cellpadding="0" cellspacing="0" height="100%" width="100%">
			<tr>
				<td colspan="2" height="100%" style="border-bottom: 1px #A7A5A6 solid;">
			        <form id="Form1" method="post" runat="server" enctype="multipart/form-data" action="./BrowsePage.aspx" target="helperIframe">
			            <table cellSpacing="0" cellPadding="0" width="100%" height="100%" class="BrowserMainTable" >
			                <tr align="center">
			                    <td colSpan="2" width="100%" height="40px" class="BrowserTitle" style="font-size: 120%; vertical-align:bottom; padding-bottom:15px;">
			                    	<spanwidth="100%">Seleccione el archivo a subir.</span>
			                    </td>
			                </tr>
			                <tr id="trFile" name="trFile">
	                            <td align="right" width="20%" height="100%">Archivo:</td>
	                            <td align="left" width="80%">
	                                <input id="flUpLoad" style="WIDTH: 90%;" type="file" runat="server" NAME="flUpLoad" />
	                            </td>
			                </tr>
			                <tr id="trText" name="trText" style="DISPLAY:none;">
	                            <td align="center" width="100%" height="100%" colspan="2">Cargando el archivo. Por favor espere..</td>
			                </tr>			                
			            </table>
			            <input type="hidden" id="hidClass" name="hidClass" />
			            <input type="hidden" id="hidMethodClass" name="hidMethodClass" />
			            <input type="hidden" id="hidMethodName" name="hidMethodName" />
			            <input type="hidden" id="hidExtensions" name="hidExtensions" />
			        </form>

				</td>
			</tr>

			<tr height="50px" id="trButtons" name="trButtons">
				<td align="center" width="50%">
					<a name="btnLimpiar" id="btnLimpiar"
   						href="javascript:CallNothing();"
   						class="Buttons BImg BC_n"
   						style="background-image: url(./Images/Buttons/ok_n.gif);"
						onclick="btnAccept_Click();"
						onkeypress="btnAccept_Click();"
						onmouseover="ButtonChangeStyle(this,'OVER');"
						onmouseout="ButtonChangeStyle(this,'NORMAL');"
						onfocus="ButtonChangeStyle(this,'OVER');"
						onblur="ButtonChangeStyle(this,'NORMAL');"
					>Aceptar</a>
				</td>
				<td align="center" width="50%">
					<a name="btnLimpiar" id="btnLimpiar"
   						href="javascript:CallNothing();"
   						class="Buttons BImg BC_n"
   						style="background-image: url(./Images/Buttons/cancel_n.gif);"
						onclick="btnCancel_Click();"
						onkeypress="btnCancel_Click();"
						onmouseover="ButtonChangeStyle(this,'OVER');"
						onmouseout="ButtonChangeStyle(this,'NORMAL');"
						onfocus="ButtonChangeStyle(this,'OVER');"
						onblur="ButtonChangeStyle(this,'NORMAL');"
					>Cancelar</a>
				</td>				
			</tr>
		</table>
		<iframe id="helperIframe" name="helperIframe" style="DISPLAY: none"></iframe>
	</body>
</HTML>
